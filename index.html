<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nienya | Архив состояний</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05070a;
            --bg-gradient: radial-gradient(circle at center, #0d1117 0%, #05070a 100%);
            --card-bg: rgba(20, 25, 35, 0.75);
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border: rgba(88, 166, 255, 0.15);
            --particle-color: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #fdfbf7;
            --bg-gradient: linear-gradient(135deg, #fffdfa 0%, #f7f1e3 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #3c342e;
            --text-muted: #8c7e74;
            --accent: #d97706;
            --border: rgba(217, 119, 6, 0.1);
            --particle-color: rgba(217, 160, 6, 0.5);
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-color);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            transition: all 0.5s ease;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            opacity: 0.3;
            animation: moveAndTwinkle var(--duration) infinite ease-in-out alternate;
        }

        @keyframes moveAndTwinkle {
            0% { opacity: 0.2; transform: translateY(0) scale(1); }
            100% { opacity: 0.7; transform: translateY(-20px) scale(1.2); }
        }

        header {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 { font-size: 3rem; font-weight: 200; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
        .author-tag { color: var(--accent); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: block; }
        
        .intro-text { font-family: 'Lora', serif; font-size: 1.05rem; color: var(--text-muted); font-style: italic; margin-bottom: 40px; }

        /* ПОИСК */
        .search-container {
            max-width: 450px;
            margin: 0 auto 25px;
            position: relative;
            z-index: 10;
        }
        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.1);
        }
        .search-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .controls { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 50px; position: relative; z-index: 10; }
        button { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 10px 24px; border-radius: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; }
        button.active { background: var(--accent); color: #fff; }

        /* МУЗЫКАЛЬНЫЙ ПЛЕЕР */
        .music-player {
            position: fixed; bottom: 30px; left: 30px; background: var(--card-bg); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 40px; display: flex; align-items: center; gap: 10px; z-index: 100; backdrop-filter: blur(10px);
        }
        .music-btn { background: none; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; padding: 0; }
        .music-info { font-size: 0.75rem; color: var(--text-muted); max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .poems-container { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 35px; padding: 0 25px 100px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 45px 40px; border-radius: 12px; backdrop-filter: blur(12px); transition: 0.3s; }
        .card-category { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 20px; display: block; letter-spacing: 2px; }
        .card-title { font-family: 'Lora', serif; font-size: 1.6rem; margin-bottom: 20px; color: var(--accent); }
        .card-content { font-family: 'Lora', serif; white-space: pre-line; font-size: 1.05rem; }

        /* ЗНАЧОК ТЕМЫ */
        .theme-toggle { 
            position: fixed; 
            bottom: 30px; 
            right: 40px; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            cursor: pointer; 
            z-index: 100; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem; 
            transition: 0.3s;
        }
        
        @media (max-width: 600px) {
            .music-player { bottom: 20px; left: 20px; padding: 8px 15px; }
            .theme-toggle { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="music-player">
        <button class="music-btn" onclick="prevTrack()">«</button>
        <button class="music-btn" id="play-pause" onclick="toggleMusic()">▶</button>
        <button class="music-btn" onclick="nextTrack()">»</button>
        <div class="music-info" id="track-name">Загрузка...</div>
        <audio id="bg-audio"></audio>
    </div>

    <div id="particles-container"></div>

    <header>
        <h1>Архив</h1>
        <span class="author-tag">by Nienya</span>
        <div class="intro-text">
            <p>Сборник состояний. <strong>Весна</strong> — время рефлексии и скрытого огня. <strong>Лето</strong> — период первых шагов. <strong>Зима</strong> — здесь говорит тоска и холод.</p>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Поиск по названию или тексту...">
        </div>

        <div class="controls">
            <button onclick="filterPoems('all')" id="btn-all" class="active">Все</button>
            <button onclick="filterPoems('spring')" id="btn-spring">Весна</button>
            <button onclick="filterPoems('summer')" id="btn-summer">Лето</button>
            <button onclick="filterPoems('winter')" id="btn-winter">Зима</button>
        </div>
    </header>

    <div class="poems-container" id="poems-list"></div>

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <script>
        const poems = [
            {
                title: "Смирительная рубашка",
                category: "summer",
                text: "В смирительной рубашке\nДожидаюсь я тебя.\nТы сделала мне больно,\nПокинула меня.\n\nПокинула ты молча,\nНе написав письмо,\nЗабыв про мои чувства,\nЗабыв и про любовь.\n\nЗастыло сердце без движенья,\nУходит жизнь, уходит прочь.\nЯ помню наши дни влюбленья,\nНо память боль приносит вновь.\n\nВ смирительной рубашке грусти,\nЗакрыв глаза от всех обид,\nВерю, снова буду счастлив,\nЧто вернёшься, сердце ждёт и верит."
            },
            {
                title: "Ульяна",
                category: "summer",
                text: "Сейчас душа аж не болит\nИ сердце вновь уже не бьется\nВсе чувства унесла метель\nТебя кто-то другой добьётся\n\nЯ доверял тебе безумно\nЯ отдавал всего себя\nПокуда все эти страданья\nНе обрушила на меня\n\nЯ верил мы с тобой, Ульяна,\nДойдем до самого конца.\nНо ты меня лишила чувства,\nЛишила счастья ты меня."
            },
            {
                title: "Ксюша",
                category: "summer",
                text: "Ну что же ты хотела,\nНаговорив с три короба мне зла,\nНу а потом ты, Ксюша,\nЖдала любви, да ласки от меня.\n\nПредставь, как я боялся,\nКогда ты резала себя.\nХотел бы сделать всё иначе,\nНо ты забила на меня.\n\nА помнишь, как же ты страдала,\nКогда в тот день закончил я?\nЗакончил муки и печали,\nЗакончил жить ради тебя."
            },
            {
                title: "Таблетки",
                category: "summer",
                text: "Таблетки не помогут,\nВрачи ушли давно.\nВ душе моей осколки,\nВ душе моей говно.\n\nПытался всё исправить,\nПытался починить,\nТебя мне не хватает,\nТебя не заменить.\n\nТаблетки не помогут.\nТаблетки — это зло.\nЯ верил вам, ребята,\nНо мне не повезло.\n\nПриходится страдать мне,\nГлядеть плохие сны,\nИ сердце камнем стало,\nТаблетки помогли.\n\nПусть строки звУчат грубо,\nНо чувства выразить хочу,\nВедь жизнь моя такая штука,\nПредсказать её я не могу"
            },
            {
                title: "Весенний вечер",
                category: "summer",
                text: "Весенний тёплый вечер\nВстанет на защиту моих снов,\nЗалечит душу грешную,\nНадарит мне котов.\n\nВесенний тёплый вечер,\nПостой, не уходи,\nВесенний тёплый вечер,\nПодольше посиди.\n\nПусть ветер шепчет тихо,\nИ звезды светят вдаль,\nТы будь моим укрытием,\nОт грусти и печали\n\nТы мне тепло подаришь,\nУтешь усталую грудь,\nЛюбовь свою оставишь,\nКоль хочешь — не забудь!"
            },
            {
                title: "Прощай, любимая",
                category: "summer",
                text: "Куда же ты спешила?\nЗачем покинула же ты?\nНе попрощавшись даже,\nОставив только лишь следы.\n\nСледы твоей обиды,\nСледы терзающих нутро.\nИ не залечат раны\nШприцы и даже обезбол.\n\nЯ верил, будем вместе.\nВсё вижу я вон те деньки,\nКак мы с новою вместе\nСидели с ночи до зари.\n\nНо лишь воспоминания\nНапоминают о тебе.\nНапоминают с болью,\nНапоминают о судьбе.\n\nПрощай, любимая,\nПрощай, возьми ты хоть цветы,\nЧто подарил тебе я,\nЧто подарил я по любви."
            },
            {
                title: "Герой жизни",
                category: "summer",
                text: "Что ж поделать,\nРасскажу вам ни о чем,\nНи о своих проблемах,\nНи о чем другом.\n\nСижу сейчас я тихо,\nО чем-то вам молвлю,\nХоть и суть рассказа\nПонять я не смогу.\n\nА мог бы сейчас стараться\nИ жить мечтами о другом,\nНо не хочу я это делать,\nУж очень мне всё влом."
            },
            {
                title: "Поиск счастья",
                category: "summer",
                text: "Я стараюсь улыбаться,\nЯ стараюсь не грустить.\nВ оптимиста превращаюсь —\nЛишь осталось закурить.\n\nЗакурить, и всё в порядке,\nНет проблем и их решений.\nЕсть лишь только расслабление —\nНужно только выпить мне.\n\nВыпил я и сразу весел,\nНожки с шеи мамы свесил.\nИ душа моя воспела:\n«Жизнь прекрасна! В чём секрет?»\n\nВыпивки мне стало мало,\nСтал искать чего покрепче.\nТак попал я в мир печали,\nГде живёт беда и стресс.\n\nДруги стали забывать,\nЖизнь идёт куда-то мимо.\nУлыбаться перестал,\nРадость больше не резвится.\n\nТолько понял поздно, братцы,\nЧто веселье - не в бутылке.\nСчастье там, где есть порядок,\nГде любовь и вдохновенье.\n\nБудем жить теперь иначе,\nБез вина и сигарет.\n\"Жизнь дана нам не случайно\",\nГоворил мне так отец"
            },
            {
                title: "Хруст",
                category: "summer",
                text: "Мы сидели, отдыхали,\nВдруг услышал резкий хруст.\nОбернулся, огляделся —\nТы уже сидишь без рук.\n\nПодошёл к тебе я бедной,\nСтал расспрашивать тебя:\n«Что случилось, дорогая?\nКто же сделал это зря?»\n\nНе успев понять, в чем дело,\nСнова слышу странный хруст.\nЯ взглянул на твое тело,\nТам лежит лишь голый труп.\n\nОт увиденного резко\nЯ хватаю ржавый нож,\nПрислоняю его к горлу.\nБез меня ты не уйдёшь"
            },
            {
                title: "Моё дело — улыбаться",
                category: "winter",
                text: "Моё дело — улыбаться,\nМоё дело — потакать.\nВаше дело — притворяться,\nЧто не хотите умирать.\n\nЧто не хочется до дрожи\nНи спасенья, ни суда,\nЧто отчаянье под кожей —\nТолько привкус, не беда.\n\nИ я поверю вам отчасти:\nВедь каждый каждому тут брат,\nКто видел боль, кто видел счастье,\nИ всё равно — не виноват.\n\nЯ верю каждому, кто любит,\nКто хоть раз пытался — вслух,\nКто себя на части рубит,\nЧтоб испустить зловонный дух.\n\nКто ночами держит сердце,\nКак горячий уголёк,\nИ не может отогреться,\nИ устал — но не отрёк.\n\nКто хотел бы стать жестоким,\nЧтобы больше не болеть,\nНо остался одиноким,\nПопытался умереть.\n\nИ вы делаете вид, что живы,\nЯ — что верю в этот свет.\nМы не злые. Мы — разбиты.\nИ других путей тут нет"
            },
            {
                title: "Мой рай в аду",
                category: "winter",
                text: "Не буду верить в бога\nИ в дьявола не верю.\nНа свете жизнь убога,\nЯ закрываю двери.\n\nИ если есть там что-то,\nТо это ад кромешный.\nНе надо мне полётов,\nХочу покой безгрешный.\n\nНо бог меня не слышит,\nА дьявол строит козни.\nИ мир мой еле дышит,\nВ нём много всякой розни.\n\nЯ сам себе не нужен,\nУж слишком я несчастен.\nВесь мир уже простужен,\nНо я ещё пристрастен.\n\nЯ не хочу быть с ними,\nИ в ад я не желаю.\nТам, где мы все иные,\nЯ всё же побываю.\n\nИ мне там будет лучше,\nЧем здесь, в раю с чертями.\nТам будут чище души,\nНо с чёрными очами."
            },
            {
                title: "Управлять собой",
                category: "winter",
                text: "Придет ли день, когда смогу я\nСамим собою управлять?\nНе знаю я. И жизнь иную\nЯ не хочу себе желать.\n\nИ ни к чему мне эти думы,\nИ ни к чему сомненья мне.\nЯ знаю: жизнь прожить без шума\nСчастливей будет в тишине.\n\nНо и она не в нашей власти —\nНе нам решать, как дальше жить.\nНам Бог дарует это счастье —\nМы не вольны его лишить.\n\nДа и не мы судьбу решаем\nВ наш трудный двадцать первый век.\nМы просто молча ожидаем,\nКогда решит все человек.\n\nНо он ведь тоже не всевластен,\nА просто пешка на доске.\nОн тоже может быть несчастен,\nКогда окажется в пике.\n\nПридет ли день, когда смогу я\nСамим собою управлять?\nСудьба решит за нас, рисуя\nСвою загадочную гладь."
            },
            {
                title: "Почему?",
                category: "winter",
                text: "Почему так происходит?\nКто ответит, кто поймет?\nТот, кто ищет, тот находит,\nТот, кто ждет, тот обретет.\n\nПочему же все иначе?\nПочему наоборот?\nКто смеется, тот и плачет,\nКто не любит, тот умрет.\n\nПочему? Зачем? Не знаю...\nНе могу найти ответ.\nОт чего я умираю?\nГде искать мне новый свет?\n\nПочему все так нелепо?\nПочему все так смешно?\nПочему же счастье слепо?\nПочему же мне темно?\n\nПочему же все напрасно?\nПочему же все не так?\nПочему же все ужасно?\nПочему же ты дурак?\n\nПочему? Зачем? Не знаю...\nНе могу найти ответ.\nЯ сегодня умираю,\nИ меня здесь больше нет."
            },
            {
                title: "Мыслей рой",
                category: "winter",
                text: "Что ж бывает, коль порой\nМыслей рой штурмует сердце,\nТо тогда - хоть волком вой,\nИль захлопни в душу дверцу.\n\nПроберёт до самых пят,\nСловно током, и по коже\nКровь застынет, будто яд,\nИ не вырваться, похоже.\n\nИ ни вправо, и ни влево\nНе уйти от дум своих,\nСловно, будто королева,\nВ сердце грусть - и в тот же миг\n\nВсё вокруг теряет краски,\nЖизнь становится пустой,\nМир вокруг не так прекрасен,\nИ, как будто бы, чужой.\n\nЧто ж бывает, коль порою\nМыслям тесно в голове,\nВряд ли я секрет открою —\nЭто значит — быть беде."
            },
            {
                title: "Вся жизнь",
                category: "winter",
                text: "Вся жизнь хуйня\nБросайте думать\nЛюбить и плакать\nВерить людям\nПлевать на всех\nКто был и будет\nБежать от тех\nКого забудут\n\nОтдать долги\nИдти по трупам\nТушить огни\nНогами в губы\nУйти в себя\nПридти к тому же\nГлотать слова\nСнаружи\n\nПисать стихи\nСтрочить доносы\nДержать удар\nДо смерти в позу\nНе видеть снов\nНе знать печали\nНе знать основ\nИ жить сначала"
            },
            {
                title: "С юмористическим окрасом",
                category: "winter",
                text: "Тепло, уют мозги ебут,\nТак вот зачем живу я тут.\nПусть дни бегут, часы молчат,\nИ жизнь течёт, как тихий взгляд.\n\nЗдесь тихо, мягко, мир хорош\nС юмористическим окрасом.\nЯ в мире том, где каждый грош\nСчитает важным, даже часом.\n\nГде каждый миг - судьбы каприз,\nГде каждый звук - дыханье ветра,\nГде ты летишь, как птица, вниз,\nЧтоб выше быть на сантиметры.\n\nГде люди - братья, где друзья —\nСмешные, милые созданья.\nГде ты живёшь не для себя,\nА ради их существованья.\n\nГде все мы - добрые, и ты —\nЛишь часть большого океана.\nГде все исполнятся мечты,\nИ все твои исчезнут раны.\n\nЗдесь тихо, мягко, мир хорош\nС юмористическим окрасом.\nЗдесь ты всегда себя найдёшь,\nНе потерявшись в мире массы."
            },
            {

                text: "Запретили тучам плакать,\nВетру — листья шевелить.\nА свидетелям событий\nПовелели всё забыть.\n\nМожно ставить сто запретов,\nМожно выключить эфир.\nТолько если что случилось —\nОбсудить успеет мир.\n\nМожно спорить с отраженьем,\nМожно эхо обвинять.\nТолько странно:\nПочему-то \nНе выходит запрещать."
            },
            {
                title: "Однажды старый соловей",
                category: "spring",
                text: "Однажды старый соловей\nВзлетел повыше тополей.\nИ стал с ветвей на всех кричать,\nКак надо правильно молчать.\nОн пел про долг и про грозу,\nПро жертву, славу и слезу.\nИ так старался громче всех,\nЧто заглушил весенний смех.\nОн клювом бил по воробьям:\n\"Не смейте щебетать не там!\"\nНо почему-то поутру\nНикто не вторил соловью.\nЛишь ветер слушал старика,\nДа посмеялась с ним река.\nА лес жил так же, как и жил,\nИ без приказов не тужил."
            },
            {
                title: "Какого голодным голодать?",
                category: "spring",
                text: "Какого голодным голодать?\nКакого немым молчать?\nКакого простым мужикам\nПо снегу с винтовкой шагать?\n\nГражданские люди берут автоматы.\nНе с песней и не со злом.\nОни бы хотели сейчас\nСидеть за домашним столом.\nИм громкие речи чужды,\nИм громкая слава смешна.\nИм только бы выжить ещё,\nДа только идёт война.\nИ где-то горит огонёк,\nИ кто-то не гасит свет.\nИ кто-то всё шепчет во сне:\n\"Вернись...\" —\nА ответа нет."
            }
        ];

        const audio = document.getElementById('bg-audio');
        const playBtn = document.getElementById('play-pause');
        const trackLabel = document.getElementById('track-name');

        const playlist = [
            { title: "Wiosna — Katawa Shoujo", file: "wiosna.mp3" },
            { title: "David Fenn — Ceramic Manor", file: "ceramic.mp3" },
            { title: "4LS Sound Team — Jitter", file: "jitter.mp3" },
            { title: "Between August and December — Blow With the Fires", file: "fires.mp3" }
        ];

        let currentTrackIndex = 0;
        
        // Глобальные состояния для фильтрации
        let currentCategory = 'all';
        let searchQuery = '';

        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.file;
            trackLabel.innerText = track.title;
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
            else { audio.pause(); playBtn.innerText = '▶'; }
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(currentTrackIndex);
            audio.play(); playBtn.innerText = '⏸';
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            audio.play(); playBtn.innerText = '⏸';
        }

        audio.onended = nextTrack;

        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.setProperty('--duration', (Math.random() * 10 + 5) + 's');
                container.appendChild(p);
            }
        }

        // ОБНОВЛЕННАЯ ФУНКЦИЯ РЕНДЕРА (Учитывает и поиск, и категорию)
        function renderPoems() {
            const container = document.getElementById('poems-list');
            container.innerHTML = '';
            
            const filtered = poems.filter(poem => {
                const matchesCategory = currentCategory === 'all' || poem.category === currentCategory;
                const matchesSearch = poem.title.toLowerCase().includes(searchQuery) || 
                                      poem.text.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });
            
            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); font-style: italic; font-family: 'Lora', serif; padding: 40px 0;">Ничего не найдено...</div>`;
                return;
            }

            filtered.forEach(poem => {
                const card = document.createElement('article');
                card.className = 'card';
                
                let readableCategory = 'Весна';
                if (poem.category === 'summer') readableCategory = 'Лето';
                else if (poem.category === 'winter') readableCategory = 'Зима';

                card.innerHTML = `<span class="card-category">${readableCategory}</span>
                                 <div class="card-title">${poem.title}</div>
                                 <div class="card-content">${poem.text}</div>`;
                container.appendChild(card);
            });
        }

        function filterPoems(category) {
            currentCategory = category;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${category}`).classList.add('active');
            renderPoems();
        }

        // ОБРАБОТЧИК ДЛЯ ПОЛЯ ВВОДА
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderPoems();
        });

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        loadTrack(0);
        createParticles();
        renderPoems();
    </script>
</body>
</html>
